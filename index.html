<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NZ FPV Site Intel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root {
  color-scheme: light dark;
  --bg: #f4f7fb;
  --panel: #ffffff;
  --panel2: #eef3f9;
  --border: #d8e1ec;
  --accent: #0ea5e9;
  --accent2: #2563eb;
  --warn: #b45309;
  --danger: #dc2626;
  --blocked: #7c3aed;
  --txt: #102133;
  --txt2: #567089;
  --mono: 'Share Tech Mono', monospace;
  --head: 'Rajdhani', sans-serif;
  --shadow: 0 12px 30px rgba(16,33,51,0.08);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #060a10;
    --panel: #0b1420;
    --panel2: #0f1d2e;
    --border: #1c3048;
    --accent: #00e676;
    --accent2: #00c8ff;
    --warn: #ffab00;
    --danger: #ff3d00;
    --blocked: #d500f9;
    --txt: #cce4f4;
    --txt2: #6890a8;
    --shadow: 0 14px 36px rgba(0,0,0,0.28);
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  display: grid;
  grid-template-columns: 380px 1fr;
  height: 100vh;
  background: var(--bg);
  color: var(--txt);
  font-family: var(--head);
  overflow: hidden;
}

.sidebar {
  display: flex;
  flex-direction: column;
  background: var(--panel);
  border-right: 1px solid var(--border);
  overflow: hidden;
  position: relative;
  z-index: 10;
}

.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, rgba(14,165,233,0.08), rgba(37,99,235,0.08));
  flex-shrink: 0;
}

.logo-icon {
  width: 40px;
  height: 40px;
  border: 2px solid var(--accent);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent);
  font-size: 17px;
  box-shadow: 0 0 14px rgba(0,230,118,0.12);
  flex-shrink: 0;
  position: relative;
}

.logo-icon::after {
  content: '';
  position: absolute;
  inset: 4px;
  border: 1px solid rgba(0,230,118,0.18);
  border-radius: 6px;
}

.header-txt .title {
  font-family: var(--head);
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 2px;
  color: var(--txt);
  line-height: 1;
}

.header-txt .sub {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--txt2);
  letter-spacing: 1.5px;
  margin-top: 3px;
}

.tabs {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.tab-btn {
  padding: 12px 6px;
  background: transparent;
  border: none;
  border-right: 1px solid var(--border);
  color: var(--txt2);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 1.5px;
  cursor: pointer;
  transition: all 0.15s;
}

.tab-btn:last-child { border-right: none; }
.tab-btn:hover { background: var(--panel2); color: var(--txt); }

.tab-btn.active {
  background: var(--panel2);
  color: var(--accent);
  box-shadow: inset 0 -2px 0 var(--accent);
}

.tab-content {
  display: none;
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  flex-direction: column;
  gap: 10px;
}

.tab-content.active { display: flex; }
.tab-content::-webkit-scrollbar { width: 3px; }
.tab-content::-webkit-scrollbar-track { background: transparent; }
.tab-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.hint {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--accent2);
  padding: 8px 10px;
  background: color-mix(in srgb, var(--accent2) 8%, transparent);
  border: 1px solid color-mix(in srgb, var(--accent2) 16%, transparent);
  border-radius: 8px;
  line-height: 1.6;
  flex-shrink: 0;
}

.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--txt2);
  letter-spacing: 1.5px;
}

input, select, textarea {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--txt);
  font-family: var(--head);
  font-size: 14px;
  padding: 10px 12px;
  width: 100%;
  transition: border-color 0.15s, background 0.15s;
}

input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--accent2);
}

input::placeholder, textarea::placeholder { color: var(--txt2); opacity: 0.65; }
select { cursor: pointer; }
select option { background: var(--panel); }
textarea { resize: vertical; min-height: 68px; }

.btn-add, .btn-secondary, .btn-del, .btn-clear {
  padding: 11px;
  border: none;
  border-radius: 9px;
  font-family: var(--head);
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 1.5px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-add {
  background: linear-gradient(135deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 70%, #000) 100%);
  color: #001a0a;
  box-shadow: 0 0 16px rgba(0,230,118,0.12);
  margin-top: 2px;
}
.btn-add:hover { box-shadow: 0 0 28px rgba(0,230,118,0.25); transform: translateY(-1px); }

.btn-secondary {
  background: var(--panel2);
  color: var(--txt);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--accent2); }

.btn-del {
  background: transparent;
  border: 1px solid color-mix(in srgb, var(--danger) 20%, transparent);
  color: var(--danger);
  font-family: var(--mono);
  font-size: 10px;
  padding: 8px 10px;
  align-self: flex-start;
}
.btn-del:hover { background: color-mix(in srgb, var(--danger) 10%, transparent); border-color: var(--danger); }

.btn-clear {
  padding: 10px;
  background: transparent;
  border: 1px solid color-mix(in srgb, var(--danger) 18%, transparent);
  color: var(--danger);
  font-family: var(--mono);
  font-size: 10px;
}
.btn-clear:hover { background: color-mix(in srgb, var(--danger) 8%, transparent); }

.no-select {
  text-align: center;
  padding: 40px 20px;
  color: var(--txt2);
  font-family: var(--mono);
  font-size: 11px;
  line-height: 2;
}

.loading-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 50px 20px;
  color: var(--txt2);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 1px;
}

.spinner {
  width: 30px; height: 30px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.intel-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
}

.intel-name {
  font-weight: 700;
  font-size: 19px;
  color: var(--txt);
  line-height: 1.2;
}

.intel-meta {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--txt2);
  margin-top: 4px;
  line-height: 1.7;
}

.score-ring {
  flex-shrink: 0;
  width: 62px; height: 62px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 2px solid;
}

.score-ring .snum {
  font-family: var(--mono);
  font-size: 21px;
  font-weight: 700;
  line-height: 1;
}

.score-ring .slbl {
  font-family: var(--mono);
  font-size: 7px;
  letter-spacing: 1.5px;
  margin-top: 2px;
}

.section-lbl {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2.5px;
  color: var(--txt2);
  border-bottom: 1px solid var(--border);
  padding-bottom: 5px;
}

.sub-scores {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.sub-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
}

.sub-lbl {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--txt2);
  letter-spacing: 1px;
  margin-bottom: 3px;
}

.sub-val {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 700;
  line-height: 1;
}

.sub-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 6px;
  overflow: hidden;
}

.sub-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.6s ease;
}

.wx-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.wx-item {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
}

.wx-lbl { font-family: var(--mono); font-size: 9px; color: var(--txt2); letter-spacing: 1px; }

.wx-val {
  font-family: var(--mono);
  font-size: 17px;
  color: var(--accent2);
  margin-top: 2px;
  line-height: 1.2;
}
.wx-unit { font-size: 10px; color: var(--txt2); }

.info-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 13px;
  color: var(--txt2);
  line-height: 1.6;
}

.air-banner {
  border-radius: 8px;
  padding: 8px 12px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.5px;
  line-height: 1.5;
}

.air-banner.clear  { background: color-mix(in srgb, var(--accent) 8%, transparent); border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent); color: var(--accent); }
.air-banner.buffer { background: color-mix(in srgb, var(--warn) 8%, transparent); border: 1px solid color-mix(in srgb, var(--warn) 25%, transparent); color: var(--warn); }
.air-banner.blocked{ background: color-mix(in srgb, var(--blocked) 8%, transparent); border: 1px solid color-mix(in srgb, var(--blocked) 25%, transparent); color: var(--blocked); }

.tags-row { display: flex; flex-wrap: wrap; gap: 4px; }

.tag {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 8px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--txt2);
}

.spot-item {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.spot-item:hover { border-color: color-mix(in srgb, var(--accent2) 30%, var(--border)); background: var(--panel2); }
.spot-item.sel { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, var(--bg)); }

.spot-item-name { font-weight: 600; font-size: 14px; color: var(--txt); }
.spot-item-sub {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--txt2);
  margin-top: 2px;
}

.spot-mini-score {
  font-family: var(--mono);
  font-size: 19px;
  font-weight: 700;
  flex-shrink: 0;
  min-width: 36px;
  text-align: right;
}

.empty-list {
  text-align: center;
  padding: 36px 16px;
  color: var(--txt2);
  font-family: var(--mono);
  font-size: 11px;
  line-height: 2;
}

#map { height: 100%; }

.leaflet-popup-content-wrapper {
  background: var(--panel);
  color: var(--txt);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 6px 30px rgba(0,0,0,0.35);
}

.leaflet-popup-tip { background: var(--panel); }
.leaflet-popup-content { font-family: var(--head); font-size: 13px; }

.leaflet-control-zoom a {
  background: var(--panel) !important;
  color: var(--txt) !important;
  border-color: var(--border) !important;
}

.leaflet-control-zoom a:hover { background: var(--panel2) !important; color: var(--accent) !important; }

@keyframes mpulse {
  0%,100% { box-shadow: 0 0 8px rgba(0,200,255,0.5); }
  50%      { box-shadow: 0 0 18px rgba(0,200,255,0.8); }
}

.pv-marker {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent2);
  border: 2px solid #fff;
  animation: mpulse 1.4s infinite;
}

.map-shell {
  position: relative;
  width: 100%;
  height: 100%;
}

.map-tools {
  position: absolute;
  top: 12px;
  left: 12px;
  z-index: 500;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  max-width: calc(100% - 24px);
}

.tool-chip, .tool-select {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--txt);
  border-radius: 10px;
  padding: 8px 10px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1px;
  box-shadow: var(--shadow);
}

.tool-select { cursor: pointer; }

.legend {
  position: absolute;
  bottom: 12px;
  left: 12px;
  z-index: 500;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px 12px;
  box-shadow: var(--shadow);
  font-family: var(--mono);
  font-size: 10px;
  color: var(--txt2);
  line-height: 1.7;
}

.legend-title {
  color: var(--txt);
  letter-spacing: 1.5px;
  margin-bottom: 4px;
  font-size: 9px;
}

.legend-item { white-space: nowrap; }

@media (max-width: 640px) {
  body { grid-template-columns: 1fr; grid-template-rows: 45vh 1fr; }
  .sidebar { order: 2; }
  .map-shell { order: 1; }
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="header">
    <div class="logo-icon">◈</div>
    <div class="header-txt">
      <div class="title">NZ FPV SITE INTEL</div>
      <div class="sub">MISSION PLANNING SYSTEM</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="add">+ ADD</button>
    <button class="tab-btn" data-tab="intel">INTEL</button>
    <button class="tab-btn" data-tab="spots">SPOTS</button>
  </div>

  <div class="tab-content active" id="tab-add">
    <div class="hint" id="hint-box">◎ Click the map to place a preview marker, then fill out the form.</div>

    <div class="form-group">
      <label>MAP BASE</label>
      <select id="f-basemap">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
        <option value="terrain">Terrain</option>
      </select>
    </div>

    <div class="form-group">
      <label>DESIGNATION</label>
      <input id="f-name" placeholder="e.g. Wairarapa Flats North" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>LATITUDE</label>
        <input id="f-lat" placeholder="-41.2865" />
      </div>
      <div class="form-group">
        <label>LONGITUDE</label>
        <input id="f-lon" placeholder="174.7762" />
      </div>
    </div>

    <div class="form-group">
      <label>OPEN AREA ESTIMATE</label>
      <select id="f-area">
        <option value="micro">Micro - under 0.5 ha</option>
        <option value="small">Small - 0.5 to 2 ha</option>
        <option value="medium" selected>Medium - 2 to 10 ha</option>
        <option value="large">Large - 10+ ha</option>
      </select>
    </div>

    <div class="form-group">
      <label>TAGS (comma separated)</label>
      <input id="f-tags" placeholder="coastal, farmland, urban, hills, trees..." />
    </div>

    <div class="form-group">
      <label>NOTES</label>
      <textarea id="f-notes" rows="3" placeholder="Access, hazards, power lines, local rules, parking..."></textarea>
    </div>

    <button class="btn-add" id="btn-add">⊕ ADD SPOT TO MAP</button>
  </div>

  <div class="tab-content" id="tab-intel">
    <div id="intel-panel">
      <div class="no-select">⊙ Select a marker on the map<br>to view site intelligence</div>
    </div>
  </div>

  <div class="tab-content" id="tab-spots">
    <div id="spots-list"></div>
    <button class="btn-clear" id="btn-clear">⊘ CLEAR ALL SPOTS</button>
  </div>
</div>

<div class="map-shell">
  <div class="map-tools">
    <select class="tool-select" id="map-base-select" aria-label="Map base selector">
      <option value="dark">Map: Dark</option>
      <option value="light">Map: Light</option>
      <option value="terrain">Map: Terrain</option>
    </select>
    <div class="tool-chip" id="system-theme-chip">Theme: system</div>
  </div>
  <div class="legend">
    <div class="legend-title">SCORE KEY</div>
    <div class="legend-item" style="color:#00e676">▪ 80-100 OPTIMAL</div>
    <div class="legend-item" style="color:#76ff03">▪ 60-79 GOOD</div>
    <div class="legend-item" style="color:#ffab00">▪ 40-59 MARGINAL</div>
    <div class="legend-item" style="color:#ff6d00">▪ 01-39 POOR</div>
    <div class="legend-item" style="color:#d500f9">◉ CTR ZONE</div>
    <div class="legend-item" style="color:#ffab00">◉ BUFFER</div>
  </div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

const URBAN_CENTRES = [
  { lat: -36.8485, lon: 174.7633 },

  { lat: -35.7251, lon: 174.3236 }
];

const map = L.map('map', { zoomControl: false }).setView([-41.0, 174.8], 6);
L.control.zoom({ position: 'bottomright' }).addTo(map);

let tileLayer = null;
function setBaseLayer(key) {
  const cfg = BASE_LAYERS[key] || BASE_LAYERS.dark;
  if (tileLayer) map.removeLayer(tileLayer);
  tileLayer = L.tileLayer(cfg.url, {

  }).addTo(map);
  currentBase = key;
  localStorage.setItem('nz-fpv-base', key);
  document.getElementById('map-base-select').value = key;
  document.getElementById('f-basemap').value = key;
}

setBaseLayer(currentBase);

const airportLayer = L.layerGroup().addTo(map);
AIRPORTS.forEach(a => {
  L.circle([a.lat, a.lon], {
    radius: a.r,
    color: '#d500f9',
    weight: 1.4,
    opacity: 0.75,
    fillColor: '#d500f9',
    fillOpacity: 0.06,
    dashArray: '5 5'
  }).addTo(airportLayer).bindPopup(`
    <b style="color:#d500f9">${a.name}</b><br>

    Approximate fixed planning ring<br>
    Verify against Airshare before flight</span>
  `);

  L.circle([a.lat, a.lon], {
    radius: a.r + 2000,
    color: '#ffab00',
    weight: 1,

  }).addTo(airportLayer);
});

const legend = L.control({ position: 'bottomleft' });
legend.onAdd = () => {
  const d = L.DomUtil.create('div');
  d.style.cssText = `background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-family:var(--mono);font-size:10px;color:var(--txt2);backdrop-filter:blur(6px);line-height:1.9;box-shadow:var(--shadow);`;
  d.innerHTML = `
    <div style="color:var(--txt);letter-spacing:1.5px;margin-bottom:4px;font-size:9px">SCORE KEY</div>
    <div style="color:#00e676">▪ 80-100 OPTIMAL</div>
    <div style="color:#76ff03">▪ 60-79 GOOD</div>
    <div style="color:#ffab00">▪ 40-59 MARGINAL</div>
    <div style="color:#ff6d00">▪ 01-39 POOR</div>
    <div style="color:#d500f9;margin-top:3px">◉ CTR ZONE</div>
    <div style="color:#ffab00;opacity:0.8">◉ 2 KM BUFFER</div>
  `;
  return d;
};
legend.addTo(map);

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function scoreColor(s) {
  if (s === null || s === undefined) return '#6890a8';
  if (s >= 80) return '#00e676';
  if (s >= 60) return '#76ff03';
  if (s >= 40) return '#ffab00';
  if (s > 0) return '#ff6d00';
  return '#d500f9';
}

function windDir(deg) {
  if (deg === null || deg === undefined) return '—';
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg / 22.5) % 16];
}

function wmoDesc(code) {
  if (code === 0) return 'Clear sky ☀';
  if (code <= 3) return 'Partly cloudy ⛅';
  if (code <= 9) return 'Overcast ☁';
  if (code <= 49) return 'Fog / haze 🌫';
  if (code <= 59) return 'Drizzle 🌦';
  if (code <= 69) return 'Rain 🌧';
  if (code <= 79) return 'Snow / sleet ❄';
  if (code <= 84) return 'Rain showers 🌦';
  if (code <= 99) return 'Thunderstorm ⛈';
  return 'Unknown';
}

async function fetchWeather(lat, lon) {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      `&current=wind_speed_10m,wind_gusts_10m,wind_direction_10m,precipitation,cloud_cover,weather_code` +
      `&wind_speed_unit=kmh&timezone=Pacific%2FAuckland`;
    const r = await fetch(url);
    if (!r.ok) return null;
    const d = await r.json();
    return d.current || null;
  } catch {
    return null;
  }
}

async function fetchTerrain(lat, lon) {
  try {
    const offsets = [[0,0],[0.01,0],[-0.01,0],[0,0.01],[0,-0.01]];
    const lats = offsets.map(o => (lat + o[0]).toFixed(5)).join(',');
    const lons = offsets.map(o => (lon + o[1]).toFixed(5)).join(',');
    const r = await fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lats}&longitude=${lons}`);
    if (!r.ok) return null;
    const d = await r.json();
    const elevs = d.elevation;
    const centre = elevs[0];
    const variance = elevs.slice(1).reduce((s, e) => s + Math.abs(e - centre), 0) / 4;
    let score;
    if (variance < 8) score = 95;
    else if (variance < 20) score = 78;
    else if (variance < 45) score = 55;
    else if (variance < 90) score = 30;
    else score = 10;
    return { score, elevation: Math.round(centre), variance: Math.round(variance) };
  } catch {
    return { score: 50, elevation: 0, variance: 0 };
  }
}

function checkAirspace(lat, lon) {
  for (const z of AIRPORTS) {
    const d = haversine(lat, lon, z.lat, z.lon);
    if (d <= z.r) return { status: 'blocked', zone: z.name, dist: d };
    if (d <= z.r + 2000) return { status: 'buffer', zone: z.name, dist: d };
  }
  return { status: 'clear', zone: null, dist: null };
}

function rfScore(lat, lon, tags) {
  let score = 100;
  const minUrban = URBAN_CENTRES.reduce((min, u) => Math.min(min, haversine(lat, lon, u.lat, u.lon)), Infinity);
  if (minUrban < 3000) score -= 45;
  else if (minUrban < 8000) score -= 28;
  else if (minUrban < 15000) score -= 12;
  const t = (tags || []).map(x => String(x).toLowerCase());
  if (t.some(x => ['urban','industrial','cbd'].includes(x))) score -= 20;
  return Math.max(0, score);
}

function areaScore(area) {
  return { micro: 12, small: 42, medium: 72, large: 100 }[area] ?? 60;
}

function wxScore(wx) {
  if (!wx) return 50;
  const wind = wx.wind_speed_10m ?? 0;
  const gust = wx.wind_gusts_10m ?? 0;
  const rain = wx.precipitation ?? 0;
  const ws = wind <= 10 ? 100 : wind <= 20 ? 85 : wind <= 30 ? 60 : wind <= 40 ? 30 : 0;
  const gs = gust <= 15 ? 100 : gust <= 25 ? 80 : gust <= 35 ? 50 : gust <= 50 ? 20 : 0;
  const ps = rain === 0 ? 100 : rain <= 0.2 ? 70 : rain <= 1 ? 30 : 0;
  return Math.round(ws * 0.40 + gs * 0.35 + ps * 0.25);
}

function compositeScore(wScore, terrain, rf, area, airspace) {
  if (airspace.status === 'blocked') return 0;
  let s = wScore * 0.30 + terrain.score * 0.20 + rf * 0.15 + area * 0.25 + (airspace.status === 'clear' ? 100 : 35) * 0.10;
  if (airspace.status === 'buffer') s *= 0.88;
  return Math.min(100, Math.max(0, Math.round(s)));
}

async function evaluateSpot(spot) {
  const [wx, terrain] = await Promise.all([
    fetchWeather(spot.lat, spot.lon),
    fetchTerrain(spot.lat, spot.lon)
  ]);
  const airspace = checkAirspace(spot.lat, spot.lon);
  const rf = rfScore(spot.lat, spot.lon, spot.tags);
  const area = areaScore(spot.area);
  const wScore = wxScore(wx);
  const score = compositeScore(wScore, terrain, rf, area, airspace);
  return { score, wx, terrain, airspace, rf, area, wScore };
}

function makeIcon(score, selected = false) {
  const c = scoreColor(score);
  const label = score !== null && score !== undefined ? score : '?';
  return L.divIcon({
    className: '',
    html: `<div style="width:38px;height:38px;border-radius:50%;background:${c}${selected ? '28' : '14'};border:2px solid ${c};display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;color:${c};box-shadow:0 0 ${selected ? 18 : 7}px ${c}${selected ? '90' : '50'};transition:all 0.2s;">${label}</div>`,
    iconSize: [38, 38],
    iconAnchor: [19, 19]
  });
}

function renderMarkers() {
  Object.values(markerMap).forEach(m => map.removeLayer(m));
  Object.keys(markerMap).forEach(k => delete markerMap[k]);

  spots.forEach(spot => {
    const m = L.marker([spot.lat, spot.lon], { icon: makeIcon(spot.cachedScore ?? null, spot.id === selectedId) }).addTo(map);
    m.on('click', () => selectSpot(spot.id));
    markerMap[spot.id] = m;
  });
}

function renderSpotsList() {
  const el = document.getElementById('spots-list');
  if (spots.length === 0) {
    el.innerHTML = '<div class="empty-list">NO SPOTS LOGGED<br><br>Click on the map to add your first FPV site</div>';
    return;
  }
  el.innerHTML = spots.map(s => {
    const col = scoreColor(s.cachedScore);
    const scoreStr = s.cachedScore !== undefined && s.cachedScore !== null ? s.cachedScore : '—';
    return `<div class="spot-item ${s.id === selectedId ? 'sel' : ''}" data-id="${s.id}"><div><div class="spot-item-name">${esc(s.name)}</div><div class="spot-item-sub">${s.lat.toFixed(4)}, ${s.lon.toFixed(4)}${s.area ? ' · ' + s.area.toUpperCase() : ''}</div></div><div class="spot-mini-score" style="color:${col}">${scoreStr}</div></div>`;
  }).join('');

  el.querySelectorAll('.spot-item').forEach(item => {
    item.addEventListener('click', () => {
      const id = +item.dataset.id;
      const spot = spots.find(s => s.id === id);
      if (spot) map.setView([spot.lat, spot.lon], 13);
      selectSpot(id);
    });
  });
}

function renderIntelLoading() {
  document.getElementById('intel-panel').innerHTML = `<div class="loading-panel"><div class="spinner"></div><div>ACQUIRING DATA...</div></div>`;
}

function renderIntel(spot, intel) {
  const { score, wx, terrain, airspace, rf, area, wScore } = intel;
  const col = scoreColor(score);
  const airBanner = airspace.status === 'blocked'
    ? `<div class="air-banner blocked">⛔ BLOCKED - ${esc(airspace.zone)}<br>${(airspace.dist/1000).toFixed(1)} km from centre · Airshare verification required</div>`
    : airspace.status === 'buffer'
      ? `<div class="air-banner buffer">⚠ BUFFER ZONE - ${esc(airspace.zone)}<br>${(airspace.dist/1000).toFixed(1)} km from CTR boundary · Verify on Airshare</div>`
      : `<div class="air-banner clear">✓ AIRSPACE CLEAR - No nearby airport CTR detected</div>`;

  const subs = [
    { label:'WEATHER', val: wScore },
    { label:'TERRAIN', val: terrain.score },
    { label:'RF / URBAN', val: rf },
    { label:'OPEN AREA', val: area }
  ];

  const subsHtml = `<div class="sub-scores">${subs.map(s => `
    <div class="sub-card">
      <div class="sub-lbl">${s.label}</div>
      <div class="sub-val" style="color:${scoreColor(s.val)}">${s.val}</div>
      <div class="sub-bar"><div class="sub-fill" style="width:${s.val}%;background:${scoreColor(s.val)}"></div></div>
    </div>`).join('')}</div>`;

  const wxHtml = wx ? `
      <div class="section-lbl">CURRENT WEATHER</div>
      <div class="wx-grid">
        <div class="wx-item"><div class="wx-lbl">WIND SPEED</div><div class="wx-val">${Math.round(wx.wind_speed_10m)}<span class="wx-unit"> km/h</span></div></div>
        <div class="wx-item"><div class="wx-lbl">GUSTS</div><div class="wx-val">${Math.round(wx.wind_gusts_10m)}<span class="wx-unit"> km/h</span></div></div>
        <div class="wx-item"><div class="wx-lbl">DIRECTION</div><div class="wx-val">${Math.round(wx.wind_direction_10m)}°<span class="wx-unit"> ${windDir(wx.wind_direction_10m)}</span></div></div>
        <div class="wx-item"><div class="wx-lbl">PRECIPITATION</div><div class="wx-val">${wx.precipitation}<span class="wx-unit"> mm</span></div></div>
        <div class="wx-item"><div class="wx-lbl">CLOUD COVER</div><div class="wx-val">${wx.cloud_cover}<span class="wx-unit"> %</span></div></div>
        <div class="wx-item"><div class="wx-lbl">ELEVATION</div><div class="wx-val">${terrain.elevation}<span class="wx-unit"> m</span></div></div>
      </div>
      <div class="info-box" style="font-family:var(--mono);font-size:11px;color:var(--accent2)">${wmoDesc(wx.weather_code)} · Terrain Δ ±${terrain.variance}m</div>`
    : `<div class="info-box" style="font-family:var(--mono);font-size:11px">Weather data unavailable · Elevation: ${terrain.elevation}m</div>`;

  const tagsHtml = spot.tags?.length ? `<div class="section-lbl">TAGS</div><div class="tags-row">${spot.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>` : '';
  const notesHtml = spot.notes ? `<div class="section-lbl">NOTES</div><div class="info-box">${esc(spot.notes)}</div>` : '';

  document.getElementById('intel-panel').innerHTML = `
    <div class="intel-header">
      <div>
        <div class="intel-name">${esc(spot.name)}</div>
        <div class="intel-meta">${spot.lat.toFixed(5)}, ${spot.lon.toFixed(5)}<br>${spot.area ? spot.area.toUpperCase() + ' OPEN AREA' : ''}</div>
      </div>
      <div class="score-ring" style="border-color:${col};box-shadow:0 0 16px ${col}35">
        <div class="snum" style="color:${col}">${score}</div>
        <div class="slbl" style="color:${col}">SCORE</div>
      </div>
    </div>
    ${airBanner}
    <div class="section-lbl">SITE SCORES</div>
    ${subsHtml}
    ${wxHtml}
    ${tagsHtml}
    ${notesHtml}
    <button class="btn-del" id="btn-del">⊗ DELETE SPOT</button>
  `;

  document.getElementById('btn-del').addEventListener('click', () => deleteSpot(spot.id));
}

async function selectSpot(id) {
  selectedId = id;
  const spot = spots.find(s => s.id === id);
  if (!spot) return;

  switchTab('intel');
  renderIntelLoading();
  renderMarkers();
  renderSpotsList();

  const intel = await evaluateSpot(spot);
  spot.cachedScore = intel.score;
  save();

  renderIntel(spot, intel);
  renderMarkers();
  renderSpotsList();
}

function addSpot() {
  const name = document.getElementById('f-name').value.trim();
  const lat = parseFloat(document.getElementById('f-lat').value);
  const lon = parseFloat(document.getElementById('f-lon').value);
  const area = document.getElementById('f-area').value;
  const tags = document.getElementById('f-tags').value.split(',').map(t => t.trim()).filter(Boolean);
  const notes = document.getElementById('f-notes').value.trim();

  if (!name) { alert('Enter a name for this spot.'); return; }
  if (isNaN(lat) || isNaN(lon)) { alert('Click the map to set coordinates, or enter them manually.'); return; }

  const spot = { id: Date.now(), name, lat, lon, area, tags, notes, cachedScore: undefined };
  spots.push(spot);
  save();

  ['f-name', 'f-tags', 'f-notes'].forEach(id => document.getElementById(id).value = '');
  if (previewMarker) { map.removeLayer(previewMarker); previewMarker = null; }
  document.getElementById('hint-box').textContent = '◎ Click the map to place a preview marker, then fill out the form.';

  renderMarkers();
  selectSpot(spot.id);
}

function deleteSpot(id) {
  if (!confirm('Delete this spot?')) return;
  spots = spots.filter(s => s.id !== id);
  if (markerMap[id]) { map.removeLayer(markerMap[id]); delete markerMap[id]; }
  if (selectedId === id) selectedId = null;
  save();
  renderMarkers();
  renderSpotsList();
  document.getElementById('intel-panel').innerHTML = '<div class="no-select">⊙ Select a marker on the map<br>to view site intelligence</div>';
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tab));
}

function esc(str) {
  return String(str ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function syncBaseSelectors(key) {
  document.getElementById('map-base-select').value = key;
  document.getElementById('f-basemap').value = key;
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    switchTab(btn.dataset.tab);
    if (btn.dataset.tab === 'spots') renderSpotsList();
  });
});

document.getElementById('btn-add').addEventListener('click', addSpot);

document.getElementById('btn-clear').addEventListener('click', () => {
  if (!confirm('Delete ALL spots? This cannot be undone.')) return;
  spots = [];
  selectedId = null;
  save();
  Object.values(markerMap).forEach(m => map.removeLayer(m));
  Object.keys(markerMap).forEach(k => delete markerMap[k]);
  if (previewMarker) { map.removeLayer(previewMarker); previewMarker = null; }
  renderSpotsList();
  document.getElementById('intel-panel').innerHTML = '<div class="no-select">⊙ Select a marker on the map<br>to view site intelligence</div>';
});

document.getElementById('map-base-select').addEventListener('change', e => setBaseLayer(e.target.value));
document.getElementById('f-basemap').addEventListener('change', e => setBaseLayer(e.target.value));

document.getElementById('system-theme-chip').textContent = `Theme: ${window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'}`;

map.on('click', e => {
  const { lat, lng } = e.latlng;
  document.getElementById('f-lat').value = lat.toFixed(6);
  document.getElementById('f-lon').value = lng.toFixed(6);

  if (previewMarker) map.removeLayer(previewMarker);
  previewMarker = L.marker([lat, lng], {
    icon: L.divIcon({
      className: '',
      html: '<div class="pv-marker"></div>',
      iconSize: [14, 14],
      iconAnchor: [7, 7]
    })
  }).addTo(map);

  switchTab('add');
  document.getElementById('hint-box').textContent = `◉ Placed at ${lat.toFixed(4)}, ${lng.toFixed(4)} — enter a name and tap ADD`;
  document.getElementById('f-name').focus();
});

renderMarkers();
renderSpotsList();

</script>
