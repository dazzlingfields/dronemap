<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NZ FPV Spot Finder</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { margin:0; font-family: Arial; display:grid; grid-template-columns: 360px 1fr; height:100vh; }
    .sidebar { overflow:auto; padding:12px; background:#0b1220; color:white; }
    .card { background:#111a2e; padding:12px; margin-bottom:12px; border-radius:10px; }
    .input { width:100%; margin:6px 0; padding:8px; }
    .button { width:100%; padding:10px; margin-top:6px; cursor:pointer; }
    #map { height:100%; }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="card">
    <h3>Add Spot</h3>
    <input id="name" class="input" placeholder="Name" />
    <input id="region" class="input" placeholder="Region" />
    <input id="lat" class="input" placeholder="Lat" />
    <input id="lon" class="input" placeholder="Lon" />
    <input id="tags" class="input" placeholder="Tags comma separated" />
    <textarea id="notes" class="input" placeholder="Notes"></textarea>
    <button id="addBtn" class="button">Add Spot</button>
    <button id="centerBtn" class="button">Use Map Center</button>
  </div>

  <div class="card">
    <h3>Spots</h3>
    <div id="spotList"></div>
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

const map = L.map('map').setView([-41.2, 174.8], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let spots = JSON.parse(localStorage.getItem('spots') || '[]');
let markers = L.layerGroup().addTo(map);

function save() {
  localStorage.setItem('spots', JSON.stringify(spots));
}

function render() {
  markers.clearLayers();
  document.getElementById('spotList').innerHTML = '';

  spots.forEach(s => {
    const m = L.marker([s.lat, s.lon]).addTo(markers);
    m.bindPopup(s.name);

    const div = document.createElement('div');
    div.innerHTML = `<b>${s.name}</b><br>${s.region}<br>${(s.tags||[]).join(', ')}`;
    div.onclick = () => map.setView([s.lat, s.lon], 11);
    document.getElementById('spotList').appendChild(div);
  });
}

function addSpot() {
  const s = {
    id: Date.now(),
    name: name.value,
    region: region.value,
    lat: parseFloat(lat.value),
    lon: parseFloat(lon.value),
    tags: tags.value.split(',').map(t=>t.trim()),
    notes: notes.value
  };
  spots.push(s);
  save();
  render();
}

function fillCenter() {
  const c = map.getCenter();
  lat.value = c.lat.toFixed(6);
  lon.value = c.lng.toFixed(6);
}

addBtn.onclick = addSpot;
centerBtn.onclick = fillCenter;

map.on('click', e => {
  lat.value = e.latlng.lat.toFixed(6);
  lon.value = e.latlng.lng.toFixed(6);
});

render();

</script>
</body>
</html>
