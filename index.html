<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NZ FPV Spot Finder</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      display: grid;
      grid-template-columns: 380px 1fr;
      height: 100vh;
      background: #0b0f19;
    }

    .sidebar {
      background: #0f172a;
      color: #e5e7eb;
      padding: 14px;
      overflow-y: auto;
      border-right: 1px solid #1f2937;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .label {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 8px;
    }

    input, textarea {
      width: 100%;
      margin-top: 6px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #243244;
      background: #0b1220;
      color: white;
      outline: none;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .primary { background: #2563eb; color: white; }
    .secondary { background: #1f2937; color: white; }

    .spotBox {
      font-size: 13px;
      line-height: 1.4;
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      background: #1f2937;
      font-size: 11px;
      margin: 3px 3px 0 0;
    }

    #map {
      height: 100vh;
    }
  </style>
</head>
<body>

<div class="sidebar">

  <div class="title">NZ FPV Planner</div>

  <div class="card">
    <div style="font-weight:600">Selected Location</div>
    <div id="selectedSpot" class="spotBox" style="margin-top:8px; opacity:0.85">
      Click map or marker
    </div>
  </div>

  <div class="card">
    <div style="font-weight:600">Add Spot</div>

    <div class="label">Name</div>
    <input id="name" />

    <div class="label">Region</div>
    <input id="region" />

    <div class="label">Latitude</div>
    <input id="lat" />

    <div class="label">Longitude</div>
    <input id="lon" />

    <div class="label">Tags</div>
    <input id="tags" placeholder="freestyle, cinematic" />

    <div class="label">Notes</div>
    <textarea id="notes" rows="3"></textarea>

    <button class="secondary" id="useMap">Use map location</button>
    <button class="primary" id="add">Add spot</button>
    <button class="secondary" id="export">Export JSON</button>
  </div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([-41, 174.8], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let spots = JSON.parse(localStorage.getItem('spots') || '[]');
let markers = L.layerGroup().addTo(map);
let selected = null;
let tempMarker = null;

function save() {
  localStorage.setItem('spots', JSON.stringify(spots));
}

function render() {
  markers.clearLayers();

  spots.forEach(s => {
    const m = L.marker([s.lat, s.lon]).addTo(markers);
    m.on('click', () => selectSpot(s));
  });
}

function selectSpot(s) {
  selected = s;

  document.getElementById('selectedSpot').innerHTML = `
    <b>${s.name}</b><br>
    ${s.region}<br>
    ${(s.tags || []).map(t => `<span class='badge'>${t}</span>`).join('')}<br>
    <br>
    ${s.notes || ''}
  `;
}

function setTemp(lat, lon) {
  document.getElementById('lat').value = lat.toFixed(6);
  document.getElementById('lon').value = lon.toFixed(6);

  if (tempMarker) map.removeLayer(tempMarker);
  tempMarker = L.marker([lat, lon], {opacity: 0.6}).addTo(map);
}

function addSpot() {
  const s = {
    id: Date.now(),
    name: name.value,
    region: region.value,
    lat: parseFloat(lat.value),
    lon: parseFloat(lon.value),
    tags: tags.value.split(',').map(t => t.trim()).filter(Boolean),
    notes: notes.value
  };

  spots.push(s);
  save();
  render();
  selectSpot(s);
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(spots, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'spots.json';
  a.click();
}

add.onclick = addSpot;
useMap.onclick = () => {
  const c = map.getCenter();
  setTemp(c.lat, c.lng);
};

export.onclick = exportJSON;

map.on('click', e => setTemp(e.latlng.lat, e.latlng.lng));

render();

</script>

</body>
</html>
