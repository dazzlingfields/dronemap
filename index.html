<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NZ FPV Site Intel</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root { color-scheme: light dark; --bg:#f4f7fb; --panel:#fff; --border:#d8e1ec; --accent:#0ea5e9; --txt:#102133; }
@media (prefers-color-scheme: dark){ :root{ --bg:#060a10; --panel:#0b1420; --border:#1c3048; --accent:#00e676; --txt:#cce4f4; } }
body{margin:0;display:grid;grid-template-columns:320px 1fr;height:100vh;background:var(--bg);color:var(--txt);font-family:sans-serif}
.sidebar{padding:10px;border-right:1px solid var(--border);overflow:auto;background:var(--panel)}
#map{height:100%}
button,select,input{margin:5px 0;padding:8px;border-radius:6px;border:1px solid var(--border);width:100%}
</style>
</head>
<body>
<div class="sidebar">
<h3>FPV Site Intel</h3>
<select id="map-base-select">
<option value="dark">Dark</option>
<option value="light">Light</option>
<option value="terrain">Terrain</option>
</select>
<input id="name" placeholder="Spot name">
<input id="lat" placeholder="Latitude">
<input id="lon" placeholder="Longitude">
<button id="add">Add Spot</button>
<div id="intel"></div>
</div>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map=L.map('map').setView([-41,174.8],6);
let tileLayer;
const BASE={
 dark:{url:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',sub:'abcd'},
 light:{url:'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',sub:'abc'},
 terrain:{url:'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',sub:'abc'}
};
function setBase(k){
 if(tileLayer) map.removeLayer(tileLayer);
 const b=BASE[k];
 tileLayer=L.tileLayer(b.url,{subdomains:b.sub,maxZoom:19}).addTo(map);
 localStorage.setItem('base',k);
}
setBase(localStorage.getItem('base')||'dark');

document.getElementById('map-base-select').onchange=e=>setBase(e.target.value);

let spots=JSON.parse(localStorage.getItem('spots')||'[]');
let markers=[];

function save(){localStorage.setItem('spots',JSON.stringify(spots));}

function render(){
 markers.forEach(m=>map.removeLayer(m));
 markers=[];
 spots.forEach(s=>{
  const m=L.marker([s.lat,s.lon]).addTo(map);
  m.on('click',()=>loadIntel(s));
  markers.push(m);
 });
}

function addSpot(){
 const name=document.getElementById('name').value;
 const lat=parseFloat(document.getElementById('lat').value);
 const lon=parseFloat(document.getElementById('lon').value);
 if(!name||isNaN(lat)||isNaN(lon)) return alert('invalid');
 spots.push({name,lat,lon});
 save();render();
}

document.getElementById('add').onclick=addSpot;

map.on('click',e=>{
 document.getElementById('lat').value=e.latlng.lat.toFixed(5);
 document.getElementById('lon').value=e.latlng.lng.toFixed(5);
});

async function fetchWeather(lat,lon){
 try{
  const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=wind_speed_10m`);
  const d=await r.json();
  return d.current;
 }catch{return null}
}

async function fetchTerrain(lat,lon){
 try{
  const r=await fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lat}&longitude=${lon}`);
  const d=await r.json();
  if(!d||!d.elevation) return {score:50};
  return {score:80};
 }catch{return {score:50}}
}

async function evaluate(s){
 let wx=null,terrain={score:50};
 try{wx=await fetchWeather(s.lat,s.lon);}catch{}
 try{terrain=await fetchTerrain(s.lat,s.lon);}catch{}
 return {wx,terrain,score:terrain.score};
}

async function loadIntel(s){
 document.getElementById('intel').innerText='loading...';
 const res=await evaluate(s);
 document.getElementById('intel').innerText=`Score: ${res.score} Wind: ${res.wx?res.wx.wind_speed_10m:'n/a'}`;
}

render();
</script>
</body>
</html>
