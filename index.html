<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NZ FPV Spot Finder</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { margin:0; font-family: Arial; display:grid; grid-template-columns: 360px 1fr; height:100vh; }
    .sidebar { overflow:auto; padding:12px; background:#0b1220; color:white; }
    .card { background:#111a2e; padding:12px; margin-bottom:12px; border-radius:10px; }
    .input { width:100%; margin:6px 0; padding:8px; }
    .button { width:100%; padding:10px; margin-top:6px; cursor:pointer; }
    #map { height:100%; }
    .spot-box { font-size:14px; line-height:1.4; }
    .badge { display:inline-block; padding:2px 6px; background:#1f2a44; border-radius:6px; margin:2px 2px 0 0; font-size:12px; }
  </style>
</head>
<body>

<div class="sidebar">

  <div class="card">
    <h3>Add Spot</h3>
    <input id="name" class="input" placeholder="Name" />
    <input id="region" class="input" placeholder="Region" />
    <input id="lat" class="input" placeholder="Lat" />
    <input id="lon" class="input" placeholder="Lon" />
    <input id="tags" class="input" placeholder="Tags comma separated" />
    <textarea id="notes" class="input" placeholder="Notes"></textarea>
    <button id="addBtn" class="button">Add Spot</button>
    <button id="centerBtn" class="button">Use Map Center</button>
    <p style="font-size:12px;opacity:0.7;">Click map to set coordinates</p>
  </div>

  <div class="card">
    <h3>Selected Spot</h3>
    <div id="selectedSpot" class="spot-box">No spot selected</div>
  </div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

const map = L.map('map').setView([-41.2, 174.8], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let spots = JSON.parse(localStorage.getItem('spots') || '[]');
let markers = L.layerGroup().addTo(map);
let selected = null;

function save() {
  localStorage.setItem('spots', JSON.stringify(spots));
}

function renderMarkers() {
  markers.clearLayers();

  spots.forEach(s => {
    const m = L.marker([s.lat, s.lon]).addTo(markers);

    m.on('click', () => selectSpot(s));
  });
}

function selectSpot(s) {
  selected = s;

  document.getElementById('selectedSpot').innerHTML = `
    <b>${s.name}</b><br>
    ${s.region}<br>
    Tags: ${(s.tags || []).map(t => `<span class='badge'>${t}</span>`).join('')}<br>
    <br>
    ${s.notes || ''}
  `;
}

function addSpot() {
  const s = {
    id: Date.now(),
    name: name.value,
    region: region.value,
    lat: parseFloat(lat.value),
    lon: parseFloat(lon.value),
    tags: tags.value ? tags.value.split(',').map(t => t.trim()) : [],
    notes: notes.value
  };

  spots.push(s);
  save();
  renderMarkers();
  selectSpot(s);
}

function fillCenter() {
  const c = map.getCenter();
  lat.value = c.lat.toFixed(6);
  lon.value = c.lng.toFixed(6);
}

addBtn.onclick = addSpot;
centerBtn.onclick = fillCenter;

map.on('click', e => {
  lat.value = e.latlng.lat.toFixed(6);
  lon.value = e.latlng.lng.toFixed(6);
});

renderMarkers();

</script>
</body>
</html>
